name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: checkout
        uses: actions/checkout@v4

      - name: install ansible
        run: |
          sudo apt update
          sudo apt install ansible -y

      - name: create key
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 400 key.pem

      - name: create inventory
        run: |
          echo "[web]" > inventory.ini
          echo "server ansible_host=${{ secrets.EC2_IP }} ansible_user=${{ secrets.EC2_USER }} ansible_ssh_private_key_file=key.pem ansible_ssh_common_args='-o StrictHostKeyChecking=no'" >> inventory.ini

      - name: run deploy
        run: |
          ansible-playbook -i inventory.ini ansible/deploy.yml