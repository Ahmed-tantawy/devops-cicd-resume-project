- name: Setup server
  hosts: web
  become: true

  tasks:

    - name: update apt
      apt:
        update_cache: yes

    - name: install docker
      apt:
        name: docker.io
        state: present

    - name: start docker
      service:
        name: docker
        state: started
        enabled: true

    - name: add ubuntu to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes