- name: Deploy website container
  hosts: web
  become: yes

  tasks:

    - name: install docker python
      apt:
        name: python3-docker
        state: present

    - name: create website folder
      file:
        path: /home/ubuntu/site
        state: directory

    - name: copy website
      copy:
        src: ../website/
        dest: /home/ubuntu/site/

    - name: run nginx container
      docker_container:
        name: resume-site
        image: nginx
        state: started
        restart_policy: always
        ports:
          - "80:80"
        volumes:
          - /home/ubuntu/site:/usr/share/nginx/html